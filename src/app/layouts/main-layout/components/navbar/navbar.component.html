<nav class="bg-neutral-primary fixed w-full z-20 top-0 inset-s-0 border-b border-default">
  <div class="mx-auto flex max-w-7xl items-center justify-between px-2 py-1.5 gap-2">
    <div class="justify-start flex items-center gap-3">
      <a href="/" class="">
        <img src="/images/route.png" class="h-9 w-9 rounded-xl object-cover" alt="Logo" />
      </a>
      <p class="hidden text-xl font-extrabold text-slate-900 sm:block">Route Posts</p>
    </div>

    <div class="flex justify-center">
      <ul
        class="flex flex-row pace-x-1 p-1 h-12 sm:space-x-8 font-medium min-w-0 items-center gap-1 overflow-x-auto rounded-2xl border border-slate-200 bg-slate-50/90 sm:px-1.5"
      >
        <li class="h-full">
          <a
            routerLink="/feed"
            routerLinkActive="bg-white text-mainColor"
            [routerLinkActiveOptions]="{ exact: true }"
            class="flex items-center gap-2 text-heading px-4 h-full rounded-xl transition-all duration-200"
          >
            <i class="fa-solid fa-house text-xl"></i>
            <span class="text-xs sm:text-sm md:text-base hidden md:inline">Feed</span>
          </a>
        </li>
        <li class="h-full">
          <a
            routerLink="/profile"
            routerLinkActive="bg-white text-mainColor"
            class="flex items-center gap-2 text-heading px-4 h-full rounded-xl transition-all duration-200"
          >
            <i class="fa-regular fa-user text-xl"></i>
            <span class="text-xs sm:text-sm md:text-base hidden md:inline">Profile</span>
          </a>
        </li>
        <li class="h-full">
          <a
            routerLink="/notification"
            routerLinkActive="bg-white text-mainColor"
            class="flex items-center gap-2 text-heading px-4 h-full rounded-xl transition-all duration-200"
          >
            <i class="fa-regular fa-comment text-xl"></i>
            <span class="text-xs sm:text-sm md:text-base hidden md:inline">Notifications</span>
          </a>
        </li>
      </ul>
    </div>

    <div
      class="flex items-center gap-2 rounded-full border border-slate-200 bg-slate-50 px-2 py-1.5 transition hover:bg-slate-100"
    >
      <img
        class="w-8 h-8 rounded-full border border-default cursor-pointer"
        src="https://flowbite.com/docs/images/people/profile-picture-5.jpg"
        alt="user photo"
      />

      <button
        (click)="toggleMenu()"
        type="button"
        class="inline-flex items-center p-2 w-9 h-9 justify-center text-body rounded-lg hover:bg-neutral-tertiary focus:outline-none"
        aria-controls="mobile-menu"
        [attr.aria-expanded]="isMenuOpen"
      >
        <i class="fa-solid fa-bars text-lg"></i>
      </button>
    </div>
  </div>
  <div
    [class.hidden]="!isMenuOpen"
    class="border-t absolute right-2 z-50 mt-2 w-52 rounded-xl border border-slate-200 bg-white p-2 shadow-lg"
    id="mobile-menu"
  >
    <button
      routerLink="/profile"
      class="flex w-full cursor-pointer items-center gap-2 rounded-lg px-3 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-100"
    >
      <i class="fa-regular fa-user w-5 text-center"></i>
      <span>Profile</span>
    </button>
    <button
      routerLink="/change"
      routerLinkActive="hover:bg-white/90 hover:text-slate-900"
      class="flex w-full cursor-pointer items-center gap-2 rounded-lg px-3 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-100"
    >
      <i class="fa-solid fa-gear w-5 text-center"></i>
      <span>Setting</span>
    </button>
    <div class="my-1 border-t border-slate-200"></div>
    <button
      (click)="logOut()"
      class="flex w-full cursor-pointer items-center gap-2 rounded-lg px-3 py-2 text-sm font-semibold text-rose-600 hover:bg-rose-50"
    >
      Logout
    </button>
  </div>
</nav>
