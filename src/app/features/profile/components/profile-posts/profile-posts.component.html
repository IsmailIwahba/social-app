<article class="overflow-visible rounded-xl border border-slate-200 bg-white shadow-sm">
  <div class="p-4">
    <div class="flex items-center gap-3">
      <a class="shrink-0"
        ><img
          src="/images/avatar-5-CDQD_dyw.jpg"
          class="h-11 w-11 rounded-full object-cover"
          alt=""
      /></a>
      <div class="min-w-0 flex-1">
        <a class="truncate text-sm font-bold text-foreground hover:underline">ismail wahba</a>
        <div class="flex flex-wrap items-center gap-1 text-xs text-muted-foreground">
          @ismailibrahim ·
          <button
            class="rounded px-0.5 py-0.5 text-xs font-semibold text-slate-500 transition hover:bg-slate-100 hover:text-slate-700 hover:underline"
          >
            3m
          </button>
          <span class="mx-1"></span>
          <span class="relative inline-flex items-center">
            <button
              class="inline-flex items-center gap-1 rounded-md px-1 py-0.5 hover:bg-slate-100 disabled:cursor-not-allowed disabled:opacity-60"
            >
              <i class="fa-solid fa-earth-americas"></i>
              Public
            </button>
          </span>
        </div>
      </div>
      <div class="relative">
        <button
          (click)="toggleMenu()"
          type="button"
          aria-controls="mobile-menu"
          [attr.aria-expanded]="isMenuOpen"
          class="rounded-full p-1.5 text-slate-500 hover:bg-slate-100 hover:text-slate-700"
        >
          <i class="fa-solid fa-ellipsis"></i>
        </button>
        @if (isMenuOpen) {
          <div
            id="mobile-menu"
            class="absolute right-0 z-20 mt-2 w-44 overflow-hidden rounded-xl border border-slate-200 bg-white py-1 shadow-lg"
          >
            <button
              class="flex w-full items-center gap-2 px-3 py-2 text-left text-sm font-semibold text-slate-700 hover:bg-slate-50"
            >
              <i class="fa-regular fa-bookmark"></i>
              Save post
            </button>
            <button
              class="flex w-full items-center gap-2 px-3 py-2 text-left text-sm font-semibold text-slate-700 hover:bg-slate-50"
            >
              <i class="fa-solid fa-pencil"></i>
              Edit post
            </button>
            <button
              class="flex w-full items-center gap-2 px-3 py-2 text-left text-sm font-semibold text-rose-600 hover:bg-rose-50"
            >
              <i class="fa-solid fa-trash-can"></i>
              Delete post
            </button>
          </div>
        }
      </div>
    </div>
    <div class="mt-3">
      <p class="whitespace-pre-wrap text-sm leading-relaxed text-foreground">Posts content</p>
    </div>
    <div
      class="mt-3 inline-flex items-center gap-1 rounded-full bg-[#e7f3ff] px-2.5 py-1 text-[11px] font-bold text-[#1877f2]"
    >
      <i class="fa-regular fa-bookmark"></i>

      Saved
    </div>
  </div>
  <div class="px-4 pb-2 pt-3 text-sm text-slate-500">
    <div class="flex flex-wrap items-center justify-between gap-2">
      <div class="flex items-center gap-2">
        <span
          class="inline-flex h-5 w-5 items-center justify-center rounded-full bg-[#1877f2] text-white"
          ><i class="fa-solid fa-thumbs-up"></i
        ></span>
        <button
          class="font-semibold transition cursor-pointer hover:text-[#1877f2] hover:underline"
        >
          1 likes
        </button>
      </div>
      <div class="flex flex-wrap items-center gap-2 text-xs sm:gap-3 sm:text-sm">
        <span class="inline-flex items-center gap-1">
          <i class="fa-solid fa-repeat"></i>
          0 shares
        </span>
        <span>1 comments</span>
        <button class="rounded-md px-2 py-1 text-xs font-bold text-[#1877f2] hover:bg-[#e7f3ff]">
          View details
        </button>
      </div>
    </div>
  </div>

  <div class="mx-4 border-t border-slate-200"></div>
  <div class="grid grid-cols-3 gap-1 p-1">
    <button
      class="cursor-pointer flex items-center justify-center gap-1.5 rounded-md p-2 text-xs font-semibold transition-colors disabled:cursor-not-allowed disabled:opacity-50 sm:gap-2 sm:text-sm text-slate-600 hover:bg-slate-100"
    >
      <i class="fa-solid fa-thumbs-up"></i>
      <span>Like</span>
    </button>
    <button
      class="cursor-pointer flex items-center justify-center gap-1.5 rounded-md p-2 text-xs font-semibold transition-colors disabled:cursor-not-allowed disabled:opacity-50 sm:gap-2 sm:text-sm text-slate-600 hover:bg-slate-100"
    >
      <i class="fa-regular fa-comment"></i>
      <span>Comment</span>
    </button>
    <button
      class="cursor-pointer flex items-center justify-center gap-1.5 rounded-md p-2 text-xs font-semibold transition-colors disabled:cursor-not-allowed disabled:opacity-50 sm:gap-2 sm:text-sm text-slate-600 hover:bg-slate-100"
    >
      <i class="fa-solid fa-share-nodes"></i>
      <span>Share</span>
    </button>
  </div>
  <div class="mx-4 mb-4 rounded-2xl border border-slate-200 bg-slate-50 p-3">
    <p class="mb-2 text-[11px] font-bold uppercase tracking-wide text-slate-500">Top Comment</p>
    <div class="flex items-start gap-2">
      <img src="/images/avatar-2-CwUcGkzI.jpg" alt="" class="h-8 w-8 rounded-full object-cover" />
      <div class="min-w-0 flex-1 rounded-2xl bg-white px-3 py-2">
        <p class="truncate text-xs font-bold text-slate-900s">Saif Mansour</p>
        <p class="mt-0.5 whitespace-pre-wrap text-sm text-slate-700">test</p>
      </div>
    </div>
    <button class="mt-2 text-xs font-bold text-[#1877f2] hover:underline">View all comments</button>
  </div>
</article>

<div class="flex min-h-10 items-center justify-center">
  <span class="text-xs font-semibold text-slate-400">You reached the end</span>
</div>
