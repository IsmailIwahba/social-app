<div class="relative flex items-center gap-2">
  <label
    class="flex cursor-pointer items-center gap-2 rounded-lg px-3 py-2 text-sm font-semibold text-slate-600 transition hover:bg-slate-100"
    ><i class="fa-solid fa-image lucide lucide-image text-emerald-600"></i>
    <span class="hidden sm:inline">Photo/video</span>
    <input type="file" class="hidden" accept="image/*" />
  </label>
  <div class="relative inline-block">
    @if (showReactions) {
      <div
        class="absolute bottom-[130%] left-1/2 z-50 flex flex-row flex-nowrap items-center gap-3 rounded-full bg-white px-4 py-2 shadow-2xl border border-slate-100 animate-fadeUp min-w-max -translate-x-1/2"
      >
        <button
          (click)="showReactions = false"
          type="button"
          class="text-2xl transition hover:scale-150 hover:-translate-y-2 focus:outline-none"
        >
          ❤️
        </button>
        <button
          (click)="showReactions = false"
          type="button"
          class="text-2xl transition hover:scale-150 hover:-translate-y-2 focus:outline-none"
        >
          🔥
        </button>
        <button
          (click)="showReactions = false"
          type="button"
          class="text-2xl transition hover:scale-150 hover:-translate-y-2 focus:outline-none"
        >
          👍
        </button>
        <button
          (click)="showReactions = false"
          type="button"
          class="text-2xl transition hover:scale-150 hover:-translate-y-2 focus:outline-none"
        >
          😂
        </button>
        <button
          (click)="showReactions = false"
          type="button"
          class="text-2xl transition hover:scale-150 hover:-translate-y-2 focus:outline-none"
        >
          😢
        </button>
      </div>
    }

    <button
      type="button"
      (click)="showReactions = !showReactions"
      class="group flex items-center justify-center rounded-lg px-3 py-2 text-sm font-semibold text-slate-600 transition-all hover:bg-slate-100 active:scale-95"
    >
      <i
        class="fa-regular fa-face-smile text-xl text-amber-500 transition-transform group-hover:scale-110"
      ></i>
    </button>
  </div>
</div>
<div class="flex items-center gap-3">
  <button
    class="flex items-center gap-2 rounded-lg bg-[#1877f2] px-5 py-2 text-sm font-extrabold text-white shadow-sm transition-colors hover:bg-[#166fe5] disabled:opacity-60"
  >
    Post
    <i class="fa-solid fa-paper-plane"></i>
  </button>
</div>
